services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: bematist-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bematist
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bematist"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:25.8-alpine
    container_name: bematist-clickhouse
    environment:
      CLICKHOUSE_DB: bematist
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bematist-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: bematist-otel-collector
    profiles: ["otel-collector"]
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - clickhouse

  # Plan-B ingest sidecar (F15 / INT0 fallback per contract 09 §Plan B).
  # Only starts with `docker compose --profile sidecar up`.
  ingest-sidecar:
    build: ./apps/ingest-sidecar
    container_name: bematist-ingest-sidecar
    profiles: ["sidecar"]
    environment:
      DEVMETRICS_SIDECAR_SOCKET: /run/devmetrics/sidecar.sock
      CLICKHOUSE_URL: http://clickhouse:8123
    volumes:
      - sidecar-socket:/run/devmetrics
    depends_on:
      - clickhouse

volumes:
  postgres-data:
  clickhouse-data:
  redis-data:
  sidecar-socket:
