name: privacy

# M2 MERGE BLOCKER — privacy adversarial gate (5 thresholds).
#
# Per CLAUDE.md §Testing Rules INT10 and dev-docs/m2-gate-agent-team.md §A16:
#
#   1. Server-side redaction recall ≥ 98% on 100-secret corpus
#   2. Clio verifier recall ≥ 95% on 50-prompt identifying corpus
#   3. Forbidden-field rejection 100% on Tier A/B (12 fields × shapes × tiers)
#   4. Nightly invariant scan — 0 raw secrets / 0 forbidden-field leaks in CH
#   5. RLS cross-tenant probe (INT9) — 0 cross-tenant rows
#
# Any gate failure exits the job non-zero. The workflow is designed to be set
# as a required status check via branch protection — that flip is an admin
# action; the README block at the bottom of this file documents the steps.
#
# Trigger paths are deliberately broad to catch upstream regressions: a change
# to the redact engines, the Clio pipeline, the ingest tier enforcer, the
# schema RLS policies, or the fixtures themselves all re-fire the gate.

on:
  pull_request:
    paths:
      - "packages/redact/**"
      - "packages/clio/**"
      - "packages/schema/**"
      - "packages/fixtures/redaction/**"
      - "packages/fixtures/clio/**"
      - "apps/ingest/src/**"
      - "tests/privacy/**"
      - ".github/workflows/privacy.yml"
      - "package.json"
  push:
    branches: [main]
    paths:
      - "packages/redact/**"
      - "packages/clio/**"
      - "packages/schema/**"
      - "packages/fixtures/redaction/**"
      - "packages/fixtures/clio/**"
      - "apps/ingest/src/**"
      - "tests/privacy/**"
      - ".github/workflows/privacy.yml"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: privacy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  privacy-gate:
    name: privacy adversarial gate (M2 MERGE BLOCKER)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        # Match ci.yml so the schema migrations + app_bematist role are loaded
        # the same way. Gates 4 + 5 require a live Postgres + ClickHouse.
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bematist
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bematist"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      clickhouse:
        image: clickhouse/clickhouse-server:25.8-alpine
        env:
          CLICKHOUSE_DB: bematist
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ""
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5435/bematist
      CLICKHOUSE_URL: http://localhost:8123
      CLICKHOUSE_DATABASE: bematist
      CH_PG_DICT_HOST: postgres
      CH_PG_DICT_PORT: "5432"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pin matches ci.yml — the @clickhouse/client keep-alive bug fixed in
          # 1.3.4 affects gate 4's CH probe.
          bun-version: "1.3.12"

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Postgres migrations (RLS + app_bematist role)
        run: bun run db:migrate:pg

      - name: Run ClickHouse migrations (events table + MVs)
        run: bun run db:migrate:ch

      - name: Run privacy adversarial gate
        # All 5 gates behind one entrypoint. Bun exits non-zero on any test
        # assertion failure — that is the merge-block signal.
        run: bun run test:privacy

      - name: Annotate result
        if: always()
        shell: bash
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "::notice title=privacy gate::All 5 thresholds met."
          else
            echo "::error title=privacy gate::One or more thresholds breached — see test output above. Merge blocked."
          fi

# -----------------------------------------------------------------------------
# Branch protection — admin action
# -----------------------------------------------------------------------------
#
# To make this gate truly merge-blocking, an admin needs to add it as a
# REQUIRED status check on the protected branch (typically `main`):
#
#   1. Settings → Branches → Branch protection rules → main
#   2. Edit the existing rule (or add one): "Require status checks to pass
#      before merging" → enabled.
#   3. Add the check: `privacy-gate (M2 MERGE BLOCKER)` (the job name above).
#   4. Save.
#
# After that, any PR with a failing privacy job cannot be merged until the
# regression is fixed. The same pattern is recommended for `ci.yml` and
# `perf.yml` (when the M2 perf gate flag flips on).
