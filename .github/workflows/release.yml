name: release

# Triggered by tag push (e.g. `v0.1.0`). Produces a signed, provenance-attested
# release of the `bematist` collector binary across linux/darwin/windows ×
# x64/arm64, plus distro-package artifacts.
#
# Security posture (CLAUDE.md §Security Rules):
#   - Distro packages are the PRIMARY install path; `curl | sh` is FALLBACK.
#   - Every binary is cosign keyless-signed using the GH Actions OIDC identity.
#   - SLSA Level 3 provenance is attached via the SLSA reusable workflow.
#   - SHA-256 of every artifact is written into the GH Release body so
#     consumers can `gh release download` + `cosign verify` without trusting
#     any intermediate layer.
#
# Status: scaffold. First real tag will flesh in the `HOMEBREW_TAP_TOKEN`,
# `AUR_SSH_KEY`, `CHOCO_API_KEY` secrets and the homebrew-tap repo name.
# Cross-platform bun --compile is supported natively — no QEMU needed.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)build, e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  BUN_VERSION: "1.2.0"
  BINARY_NAME: bematist

jobs:
  meta:
    name: resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - id: v
        name: Resolve tag and version
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build:
    name: build ${{ matrix.target }}
    needs: meta
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
            bun_target: bun-linux-x64
            ext: ""
          - target: linux-arm64
            runner: ubuntu-latest
            bun_target: bun-linux-arm64
            ext: ""
          # darwin-x64 temporarily dropped due to sustained macos-13 runner
          # queue contention on 2026-04-18. Team is all Apple Silicon at v0.1;
          # re-add before v0.2 so Intel-Mac customers are covered.
          #
          # - target: darwin-x64
          #   runner: macos-13
          #   bun_target: bun-darwin-x64
          #   ext: ""
          - target: darwin-arm64
            runner: macos-14
            bun_target: bun-darwin-arm64
            ext: ""
          - target: windows-x64
            runner: windows-latest
            bun_target: bun-windows-x64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Compile collector binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          out="dist/${{ env.BINARY_NAME }}-${{ needs.meta.outputs.tag }}-${{ matrix.target }}${{ matrix.ext }}"
          bun build \
            --compile \
            --minify \
            --sourcemap \
            --target="${{ matrix.bun_target }}" \
            apps/collector/src/cli.ts \
            --outfile "$out"
          ls -la "$out"

      - name: Compute SHA-256
        id: sha
        shell: bash
        run: |
          set -euo pipefail
          out="dist/${{ env.BINARY_NAME }}-${{ needs.meta.outputs.tag }}-${{ matrix.target }}${{ matrix.ext }}"
          if command -v sha256sum >/dev/null 2>&1; then
            hash=$(sha256sum "$out" | awk '{print $1}')
          else
            hash=$(shasum -a 256 "$out" | awk '{print $1}')
          fi
          echo "digest=$hash" >> "$GITHUB_OUTPUT"
          echo "$hash  $(basename "$out")" > "$out.sha256"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Cosign keyless sign
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          out="dist/${{ env.BINARY_NAME }}-${{ needs.meta.outputs.tag }}-${{ matrix.target }}${{ matrix.ext }}"
          cosign sign-blob \
            --yes \
            --output-signature "$out.sig" \
            --output-certificate "$out.pem" \
            "$out"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: |
            dist/${{ env.BINARY_NAME }}-${{ needs.meta.outputs.tag }}-${{ matrix.target }}${{ matrix.ext }}
            dist/${{ env.BINARY_NAME }}-${{ needs.meta.outputs.tag }}-${{ matrix.target }}${{ matrix.ext }}.sha256
            dist/${{ env.BINARY_NAME }}-${{ needs.meta.outputs.tag }}-${{ matrix.target }}${{ matrix.ext }}.sig
            dist/${{ env.BINARY_NAME }}-${{ needs.meta.outputs.tag }}-${{ matrix.target }}${{ matrix.ext }}.pem
          if-no-files-found: error
          retention-days: 7

  verify:
    # Prove the cosign keyless signatures produced by `build` actually verify
    # against the expected OIDC identity — same check downstream consumers run
    # via `cosign verify-blob`. If this fails, no release is cut (gated via
    # `release.needs`). This is the in-CI counterpart to the install-time
    # verify documented in packaging/install.sh.
    name: verify cosign signatures
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: ${{ env.BINARY_NAME }}-*
          merge-multiple: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify every binary signature
        shell: bash
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          failed=0
          cd dist
          for bin in ${BINARY_NAME}-*; do
            case "$bin" in
              *.sha256|*.sig|*.pem) continue ;;
            esac
            sig="${bin}.sig"
            cert="${bin}.pem"
            if [[ ! -f "$sig" || ! -f "$cert" ]]; then
              echo "verify: missing signature/certificate for $bin" >&2
              failed=1
              continue
            fi
            echo "verify: $bin"
            if ! cosign verify-blob \
                --certificate-identity-regexp "^https://github.com/${REPO}/\\.github/workflows/release\\.yml@refs/tags/v" \
                --certificate-oidc-issuer https://token.actions.githubusercontent.com \
                --certificate "$cert" \
                --signature "$sig" \
                "$bin"; then
              echo "verify: FAILED for $bin" >&2
              failed=1
            fi
          done
          if [[ $failed -ne 0 ]]; then
            echo "verify: one or more signatures did not validate" >&2
            exit 1
          fi
          echo "verify: all signatures OK"

  collect-hashes:
    name: assemble SHA-256 manifest
    needs: [meta, build]
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.h.outputs.hashes }}
    steps:
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: ${{ env.BINARY_NAME }}-*
          merge-multiple: true

      - name: Build base64 hash manifest for SLSA
        id: h
        run: |
          set -euo pipefail
          # SLSA generator expects base64-encoded `sha256 name\n...` list.
          (
            cd dist
            for f in ${BINARY_NAME}-*; do
              case "$f" in
                *.sha256|*.sig|*.pem) continue ;;
              esac
              sha256sum "$f"
            done
          ) > dist/manifest.sha256
          b64=$(base64 -w0 < dist/manifest.sha256)
          echo "hashes=$b64" >> "$GITHUB_OUTPUT"

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: manifest
          path: dist/manifest.sha256

  provenance:
    name: SLSA L3 provenance
    needs: [meta, collect-hashes]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: ${{ needs.collect-hashes.outputs.hashes }}
      upload-assets: false
      provenance-name: bematist-${{ needs.meta.outputs.tag }}.intoto.jsonl

  package:
    name: build distro packages
    needs: [meta, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: ${{ env.BINARY_NAME }}-*
          merge-multiple: true

      - name: Build .deb (linux-x64 + linux-arm64)
        shell: bash
        run: |
          set -euo pipefail
          bash packaging/deb/build.sh \
            "${{ needs.meta.outputs.version }}" \
            "dist/${{ env.BINARY_NAME }}-${{ needs.meta.outputs.tag }}-linux-x64" \
            dist/${{ env.BINARY_NAME }}_${{ needs.meta.outputs.version }}_amd64.deb \
            amd64
          bash packaging/deb/build.sh \
            "${{ needs.meta.outputs.version }}" \
            "dist/${{ env.BINARY_NAME }}-${{ needs.meta.outputs.tag }}-linux-arm64" \
            dist/${{ env.BINARY_NAME }}_${{ needs.meta.outputs.version }}_arm64.deb \
            arm64

      - name: Render Homebrew formula
        shell: bash
        run: |
          set -euo pipefail
          bash packaging/homebrew/render.sh \
            "${{ needs.meta.outputs.version }}" \
            "${{ github.repository }}" \
            dist > dist/bematist.rb

      - name: Render AUR PKGBUILD
        shell: bash
        run: |
          set -euo pipefail
          bash packaging/aur/render.sh \
            "${{ needs.meta.outputs.version }}" \
            "${{ github.repository }}" \
            dist > dist/PKGBUILD

      - name: Render Chocolatey nuspec
        shell: bash
        run: |
          set -euo pipefail
          bash packaging/choco/render.sh \
            "${{ needs.meta.outputs.version }}" \
            "${{ github.repository }}" \
            dist

      - name: Upload distro package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distro-packages
          path: |
            dist/*.deb
            dist/bematist.rb
            dist/PKGBUILD
            dist/bematist.nuspec
            dist/tools/**
          if-no-files-found: error
          retention-days: 7

  sbom:
    name: CycloneDX SBOM
    needs: [meta, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: ${{ env.BINARY_NAME }}-*
          merge-multiple: true

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: dist/
          format: cyclonedx-json
          output-file: bematist-${{ needs.meta.outputs.tag }}.cdx.json
          artifact-name: bematist-${{ needs.meta.outputs.tag }}.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ needs.meta.outputs.tag }}
          path: bematist-${{ needs.meta.outputs.tag }}.cdx.json
          if-no-files-found: error
          retention-days: 30

  release:
    name: publish GH release
    # `package` renders the Homebrew formula + AUR PKGBUILD + Chocolatey
    # nuspec and uploads them as the `distro-packages` artifact. Render
    # scripts now skip missing arches gracefully (see
    # tests/packaging/render-resilience.sh), so v0.1.x releases work even
    # with darwin-x64 temporarily dropped from the build matrix. Distro
    # publishing itself is still `if: false` on every channel until upstream
    # provisioning completes — see dev-docs/m5-installer-plan.md §Rollout.
    needs: [meta, build, verify, collect-hashes, provenance, sbom, package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          # Binaries + signatures + certs + per-file .sha256
          find artifacts -type f \( \
               -name "${{ env.BINARY_NAME }}-*" \
            -o -name "*.deb" \
            -o -name "bematist.rb" \
            -o -name "PKGBUILD" \
            -o -name "bematist.nuspec" \
            -o -name "manifest.sha256" \
            -o -name "*.intoto.jsonl" \
            -o -name "*.cdx.json" \
          \) -exec cp {} release/ \;
          ls -la release/

      - name: Assemble release notes
        shell: bash
        run: |
          set -euo pipefail
          cat > release/NOTES.md <<EOF
          ## Bematist ${{ needs.meta.outputs.tag }}

          Open-source, self-hostable AI-engineering analytics. Apache 2.0.

          ### Install (recommended)

          \`\`\`sh
          # 1. Download matching asset + signature
          gh release download ${{ needs.meta.outputs.tag }} \\
            --repo ${{ github.repository }} \\
            --pattern '${{ env.BINARY_NAME }}-*-<os>-<arch>*'

          # 2. Verify cosign keyless signature (trusted OIDC identity)
          cosign verify-blob \\
            --certificate-identity-regexp '^https://github.com/${{ github.repository }}/\.github/workflows/release\.yml@refs/tags/v' \\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \\
            --certificate ${{ env.BINARY_NAME }}-*-<os>-<arch>.pem \\
            --signature ${{ env.BINARY_NAME }}-*-<os>-<arch>.sig \\
            ${{ env.BINARY_NAME }}-*-<os>-<arch>

          # 3. Install to PATH
          install -m 0755 ${{ env.BINARY_NAME }}-*-<os>-<arch> /usr/local/bin/bematist
          \`\`\`

          ### Distro packages

          - Homebrew: \`brew install bematist/tap/bematist\`
          - Debian/Ubuntu: download \`bematist_${{ needs.meta.outputs.version }}_<arch>.deb\` and \`dpkg -i\`
          - Arch (AUR): \`yay -S bematist-bin\`
          - Windows (Chocolatey): \`choco install bematist\`

          ### SHA-256 manifest

          \`\`\`
          $(cat release/manifest.sha256)
          \`\`\`

          ### Provenance

          SLSA Level 3 provenance is attached as \`bematist-${{ needs.meta.outputs.tag }}.intoto.jsonl\`.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: Bematist ${{ needs.meta.outputs.tag }}
          body_path: release/NOTES.md
          draft: true
          prerelease: ${{ contains(needs.meta.outputs.tag, '-') }}
          files: |
            release/${{ env.BINARY_NAME }}-*
            release/manifest.sha256
            release/*.intoto.jsonl
            release/*.cdx.json
            packaging/install.sh

  # ---------------------------------------------------------------------------
  # Registry-publish jobs.
  #
  # Per PRD §11 / CLAUDE.md §Security Rules, distro packages are the PRIMARY
  # install path — Homebrew, apt/deb, AUR, Chocolatey. Each channel below is
  # fully scaffolded (template + render + artifact) but gated `if: false`
  # pending owner-side provisioning. See dev-docs/release-audit-m3.md for the
  # exact follow-up checklist per channel.
  #
  # Flipping any single channel on is a one-line guard change once its
  # secrets + upstream repo/account exist.
  # ---------------------------------------------------------------------------

  publish-homebrew:
    name: publish Homebrew formula
    needs: [meta, release]
    runs-on: ubuntu-latest
    # TODO(distro): to flip this on, complete Day-1 provisioning per
    # dev-docs/m5-installer-plan.md §Channel 1:
    #   1. Create pella-labs/homebrew-tap repo (standalone; name MUST start
    #      with `homebrew-`). Seed with Formula/bematist.rb placeholder +
    #      README + a `brew test-bot` workflow.
    #   2. Mint a fine-grained PAT on an account with Contents:read-write
    #      on the tap repo only. Store as GH Actions secret HOMEBREW_TAP_TOKEN.
    # Then change `if: ${{ false && … }}` → `if: ${{ !contains(… , '-') }}`.
    # Every other step is ready; the formula is rendered by `package`
    # and flows in via the distro-packages artifact.
    if: ${{ false && !contains(needs.meta.outputs.tag, '-') }}
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: pella-labs/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Download formula artifact
        uses: actions/download-artifact@v4
        with:
          name: distro-packages
          path: pkg

      - name: Publish formula
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tap/Formula
          cp pkg/bematist.rb tap/Formula/bematist.rb
          cd tap
          git config user.name 'bematist-release-bot'
          git config user.email 'release-bot@bematist.dev'
          git add Formula/bematist.rb
          # Skip if the tag already landed (re-run safety).
          if git diff --cached --quiet; then
            echo "formula unchanged — nothing to push"
            exit 0
          fi
          git commit -m "bematist ${{ needs.meta.outputs.tag }}"
          git push

  publish-deb:
    name: publish apt repository
    needs: [meta, release]
    runs-on: ubuntu-latest
    # TODO(distro): requires apt-repo host decision (OpenSUSE OBS vs
    # self-hosted freight on S3+CloudFront vs launchpad) + GPG signing key
    # provisioning. Until then the .deb files are attached to the GH release
    # and installed via `curl -L … && dpkg -i`. See
    # dev-docs/release-audit-m3.md §Debian / Ubuntu.
    if: ${{ false && !contains(needs.meta.outputs.tag, '-') }}
    steps:
      - name: Download distro-packages artifact
        uses: actions/download-artifact@v4
        with:
          name: distro-packages
          path: pkg

      - name: TODO — sign + push to apt repo
        shell: bash
        run: |
          set -euo pipefail
          # TODO: import APT_SIGNING_KEY (GPG private key) via --batch.
          # TODO: run apt-ftparchive packages dists/stable/main/binary-amd64/
          #   and binary-arm64/; generate Release + InRelease via gpg --sign.
          # TODO: aws s3 sync to the repo bucket; purge CDN edges.
          # Reference: https://wiki.debian.org/DebianRepository/SetupWithReprepro
          echo "publish-deb: stub — see TODO above" >&2
          exit 1

  publish-aur:
    name: publish AUR package
    needs: [meta, release]
    runs-on: ubuntu-latest
    # TODO(distro): requires AUR account SSH key + `.SRCINFO` regeneration via
    # `makepkg --printsrcinfo > .SRCINFO`. AUR accepts pushes over
    # ssh://aur@aur.archlinux.org/bematist-bin.git. Until then, v0.1.0 is
    # hand-pushed. See dev-docs/release-audit-m3.md §AUR.
    if: ${{ false && !contains(needs.meta.outputs.tag, '-') }}
    steps:
      - name: Download distro-packages artifact
        uses: actions/download-artifact@v4
        with:
          name: distro-packages
          path: pkg

      - name: TODO — push PKGBUILD to AUR
        shell: bash
        run: |
          set -euo pipefail
          # TODO: load AUR_SSH_KEY (ed25519 private key) into ssh-agent.
          # TODO: git clone ssh://aur@aur.archlinux.org/bematist-bin.git aur-pkg.
          # TODO: cp pkg/PKGBUILD aur-pkg/; (cd aur-pkg && makepkg --printsrcinfo > .SRCINFO).
          # TODO: cd aur-pkg && git add -A && git commit -m "bematist $TAG" && git push.
          echo "publish-aur: stub — see TODO above" >&2
          exit 1

  publish-choco:
    name: publish Chocolatey package
    needs: [meta, release]
    runs-on: windows-latest
    # TODO(distro): requires Chocolatey community-feed account + CHOCO_API_KEY
    # secret + first-package moderation (~1 week). Until then the .nuspec is
    # attached to the GH release. See dev-docs/release-audit-m3.md §Chocolatey.
    if: ${{ false && !contains(needs.meta.outputs.tag, '-') }}
    steps:
      - name: Download distro-packages artifact
        uses: actions/download-artifact@v4
        with:
          name: distro-packages
          path: pkg

      - name: TODO — choco pack + push
        shell: pwsh
        run: |
          # TODO: Copy-Item pkg/bematist.nuspec . ; Copy-Item -Recurse pkg/tools .
          # TODO: choco pack bematist.nuspec
          # TODO: choco push bematist.$env:VERSION.nupkg --api-key $env:CHOCO_API_KEY --source https://push.chocolatey.org/
          Write-Error "publish-choco: stub — see TODO above"
          exit 1
