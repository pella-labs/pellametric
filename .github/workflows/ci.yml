name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: lint · typecheck · test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bematist
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bematist"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      clickhouse:
        image: clickhouse/clickhouse-server:25.8-alpine
        env:
          CLICKHOUSE_DB: bematist
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ""
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6381:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5435/bematist
      CLICKHOUSE_URL: http://localhost:8123
      REDIS_URL: redis://localhost:6381
      # CH container needs to reach PG for the dev_team_dict dictionary.
      # In GitHub Actions service containers share a network and reach each
      # other by the job-service name ("postgres" below).
      CH_PG_DICT_HOST: postgres
      CH_PG_DICT_PORT: "5432"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned to match root package.json engines.bun (>=1.3.4).
          # Sprint-1 bumped the floor because @clickhouse/client keep-alive
          # silently degrades on Bun <1.3.4 (three http.Agent bugs fixed in
          # 1.3.4 per D-S1-9). The runtime assertion in
          # apps/ingest/src/engines.test.ts fails the build on <1.3.4.
          bun-version: "1.3.12"

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check OTLP generated bindings are in sync with vendored proto
        # `buf generate` + `git diff --exit-code src/gen` — fails if someone
        # edited packages/otel/vendor/opentelemetry-proto/** without
        # regenerating packages/otel/src/gen/**. buf CLI ships prebuilt via
        # @bufbuild/buf (no protoc install needed).
        run: bun run check:otel-generated

      - name: Run Postgres migrations
        run: bun run db:migrate:pg

      - name: Run ClickHouse migrations
        run: bun run db:migrate:ch

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  e2e-use-fixtures-0:
    name: e2e · USE_FIXTURES=0 · collector → ingest → CH → dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bematist
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bematist"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      clickhouse:
        image: clickhouse/clickhouse-server:25.8-alpine
        env:
          CLICKHOUSE_DB: bematist
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ""
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6381:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5435/bematist
      CLICKHOUSE_URL: http://localhost:8123
      REDIS_URL: redis://localhost:6381
      CH_PG_DICT_HOST: postgres
      CH_PG_DICT_PORT: "5432"
      TEST_E2E: "1"
      E2E_INGEST_PORT: "8767"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Postgres migrations
        run: bun run db:migrate:pg

      - name: Run ClickHouse migrations
        run: bun run db:migrate:ch

      # Real test — drives one event collector → ingest → ClickHouse and
      # asserts the USE_FIXTURES=0 dashboard query routes through real CH.
      - name: USE_FIXTURES=0 end-to-end
        run: bun test apps/web/integration-tests/use-fixtures-0.test.ts
