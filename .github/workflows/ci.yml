name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Run ${{ matrix.task }}
        run: bun run ${{ matrix.task }}

  build:
    name: build (web)
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build web
        env:
          # Dummy values so Next.js build can evaluate pages that read process.env
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          BETTER_AUTH_SECRET: ci_placeholder_secret_please_ignore
          BETTER_AUTH_URL: http://localhost:3000
          GITHUB_CLIENT_ID: ci_client_id
          GITHUB_CLIENT_SECRET: ci_client_secret
          NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3000
        run: bun --filter='./apps/web' run build

      - name: Build collector (bun bundle)
        run: bun --filter='./apps/collector' run build
