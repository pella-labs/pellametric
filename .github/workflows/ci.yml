name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: lint · typecheck · test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bematist
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bematist"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      clickhouse:
        image: clickhouse/clickhouse-server:25.8-alpine
        env:
          CLICKHOUSE_DB: bematist
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ""
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6381:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5435/bematist
      CLICKHOUSE_URL: http://localhost:8123
      REDIS_URL: redis://localhost:6381
      # CH container needs to reach PG for the dev_team_dict dictionary.
      # In GitHub Actions service containers share a network and reach each
      # other by the job-service name ("postgres" below).
      CH_PG_DICT_HOST: postgres
      CH_PG_DICT_PORT: "5432"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.0"

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Postgres migrations
        run: bun run db:migrate:pg

      - name: Run ClickHouse migrations
        run: bun run db:migrate:ch

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test
